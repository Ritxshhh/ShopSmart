version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
    volumes:
      - ./server/database:/app/server/database # To persist SQLite database if needed
    restart: always

# Optional: Add a database service like Redis or Postgres if you move away from SQLite
