# ============================================================
# GitHub Actions — Full CI/CD Pipeline
# Tests → Terraform Apply → Docker Build & Push → Deploy to ECS
# AWS Academy Compatible (uses session token)
# ============================================================

name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  TF_VERSION: 1.14.8
  TF_IN_AUTOMATION: true
  TF_VAR_subnet_ids: '["${{ secrets.AWS_SUBNET_ID }}"]'
  TF_VAR_security_group_id: ${{ secrets.AWS_SECURITY_GROUP_ID }}

jobs:
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          echo "✅ Terraform formatting is valid"

      - name: Terraform Init (backend=false)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: |
          terraform validate
          echo "✅ Terraform configuration is valid"

      - name: Install hadolint
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Run hadolint
        run: |
          hadolint Docker/Dockerfile.backend Docker/Dockerfile.frontend
          echo "✅ Dockerfiles pass linting"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Backend — Install dependencies
        working-directory: server
        run: npm ci

      - name: Backend — Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Backend — Run tests
        working-directory: server
        run: npx --no-install vitest run --reporter=junit --outputFile=test-results/junit.xml

      - name: Backend — Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: server/test-results/junit.xml
          if-no-files-found: warn

      - name: Frontend — Install dependencies
        working-directory: client
        run: npm ci

      - name: Frontend — Run tests
        working-directory: client
        run: npx --no-install vitest run --reporter=junit --outputFile=test-results/junit.xml

      - name: Frontend — Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: client/test-results/junit.xml
          if-no-files-found: warn

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate AWS_REGION secret
        run: |
          test -n "${{ secrets.AWS_REGION }}" || (echo "❌ Missing secret: AWS_REGION" && exit 1)
          echo "✅ AWS_REGION secret is present"

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}" || (echo "❌ Missing secret: AWS_ACCESS_KEY_ID" && exit 1)
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || (echo "❌ Missing secret: AWS_SECRET_ACCESS_KEY" && exit 1)
          test -n "${{ secrets.AWS_SESSION_TOKEN }}" || (echo "❌ Missing secret: AWS_SESSION_TOKEN" && exit 1)
          test -n "${{ secrets.AWS_SUBNET_ID }}" || (echo "❌ Missing secret: AWS_SUBNET_ID" && exit 1)
          test -n "${{ secrets.AWS_SECURITY_GROUP_ID }}" || (echo "❌ Missing secret: AWS_SECURITY_GROUP_ID" && exit 1)
          echo "✅ All required secrets are present"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup S3 backend (with AWS Academy fallback)
        run: |
          # Trim any whitespace/newlines from secrets
          BUCKET=$(echo "${{ secrets.TF_STATE_BUCKET }}" | tr -d '[:space:]')
          REGION=$(echo "${{ secrets.AWS_REGION }}" | tr -d '[:space:]')
          USE_S3=false

          if [ -n "$BUCKET" ]; then
            if aws s3api head-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null; then
              echo "✅ S3 bucket $BUCKET already exists"
              USE_S3=true
            else
              echo "Creating S3 bucket $BUCKET for Terraform state..."
              # us-east-1 does not accept LocationConstraint; try with it first, then without
              if aws s3api create-bucket \
                  --bucket "$BUCKET" \
                  --region "$REGION" \
                  --create-bucket-configuration LocationConstraint="$REGION" 2>/dev/null || \
                 aws s3api create-bucket \
                  --bucket "$BUCKET" \
                  --region "$REGION" 2>/dev/null; then

                aws s3api put-bucket-versioning \
                  --bucket "$BUCKET" \
                  --versioning-configuration Status=Enabled

                aws s3api put-bucket-encryption \
                  --bucket "$BUCKET" \
                  --server-side-encryption-configuration \
                    '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

                aws s3api put-public-access-block \
                  --bucket "$BUCKET" \
                  --public-access-block-configuration \
                    "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

                echo "✅ S3 bucket $BUCKET created with versioning, AES256 encryption, and public-access-block"
                USE_S3=true
              else
                echo "⚠️  WARNING: Could not create S3 bucket (AWS Academy may not support S3 backend). Falling back to local state."
              fi
            fi
          else
            echo "⚠️  WARNING: TF_STATE_BUCKET secret not set. Falling back to local state."
          fi

          echo "USE_S3=$USE_S3" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: terraform
        run: |
          BUCKET=$(echo "${{ secrets.TF_STATE_BUCKET }}" | tr -d '[:space:]')
          REGION=$(echo "${{ secrets.AWS_REGION }}" | tr -d '[:space:]')
          if [ "$USE_S3" = "true" ]; then
            terraform init -upgrade -input=false -reconfigure \
              -backend-config="bucket=${BUCKET}" \
              -backend-config="key=shopsmart/terraform.tfstate" \
              -backend-config="region=${REGION}" \
              -backend-config="encrypt=true"
            echo "✅ Terraform initialized with S3 remote state"
          else
            terraform init -upgrade -input=false -reconfigure
            echo "✅ Terraform initialized with local state (fallback)"
          fi

      - name: Terraform Import Existing Resources
        working-directory: terraform
        env:
          TF_VAR_image_tag: ${{ github.sha }}
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
        run: |
          echo "Checking for existing ECR repositories..."

          if aws ecr describe-repositories --repository-names "shopsmart-backend" --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1; then
            echo "Backend ECR exists, importing..."
            terraform import -input=false aws_ecr_repository.backend "shopsmart-backend" || echo "Import failed or already in state"
          fi

          if aws ecr describe-repositories --repository-names "shopsmart-frontend" --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1; then
            echo "Frontend ECR exists, importing..."
            terraform import -input=false aws_ecr_repository.frontend "shopsmart-frontend" || echo "Import failed or already in state"
          fi

          if aws ecs describe-clusters --clusters "shopsmart-cluster" --region "${{ secrets.AWS_REGION }}" 2>/dev/null | grep -q "shopsmart-cluster"; then
            echo "ECS cluster exists, importing..."
            terraform import -input=false aws_ecs_cluster.main "shopsmart-cluster" || echo "Import failed or already in state"
          else
            echo "ECS cluster not found or access denied, skipping import"
          fi

          # Import ECS services if they exist
          CLUSTER_ARN=$(aws ecs describe-clusters --clusters "shopsmart-cluster" --region "${{ secrets.AWS_REGION }}" --query "clusters[0].clusterArn" --output text 2>/dev/null || echo "")
          if [ -n "$CLUSTER_ARN" ] && [ "$CLUSTER_ARN" != "None" ]; then
            if aws ecs describe-services --cluster "shopsmart-cluster" --services "shopsmart-backend-service" --region "${{ secrets.AWS_REGION }}" --query "services[?status=='ACTIVE']" --output text 2>/dev/null | grep -q "shopsmart-backend-service"; then
              echo "Backend ECS service exists, importing..."
              terraform import -input=false aws_ecs_service.backend "shopsmart-cluster/shopsmart-backend-service" || echo "Import failed or already in state"
            fi

            if aws ecs describe-services --cluster "shopsmart-cluster" --services "shopsmart-frontend-service" --region "${{ secrets.AWS_REGION }}" --query "services[?status=='ACTIVE']" --output text 2>/dev/null | grep -q "shopsmart-frontend-service"; then
              echo "Frontend ECS service exists, importing..."
              terraform import -input=false aws_ecs_service.frontend "shopsmart-cluster/shopsmart-frontend-service" || echo "Import failed or already in state"
            fi
          fi

          echo "✅ Existing resources imported"

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_image_tag: ${{ github.sha }}
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
        run: |
          terraform plan -input=false -out=tfplan
          echo "✅ Terraform plan complete"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -input=false -auto-approve tfplan
          echo "✅ Infrastructure provisioned successfully"

  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [terraform-apply]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate AWS_REGION secret
        run: |
          test -n "${{ secrets.AWS_REGION }}" || (echo "❌ Missing secret: AWS_REGION" && exit 1)
          echo "✅ AWS_REGION secret is present"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_BACKEND_REPO: shopsmart-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecr describe-repositories --repository-names "$ECR_BACKEND_REPO" --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_BACKEND_REPO" --region "${{ secrets.AWS_REGION }}"

          IMAGE_URI=$ECR_REGISTRY/$ECR_BACKEND_REPO:$IMAGE_TAG

          echo "Building backend Docker image..."
          docker build -f Docker/Dockerfile.backend -t $IMAGE_URI .

          echo "Pushing backend image to ECR..."
          docker push $IMAGE_URI

          echo "✅ Backend Docker image pushed: $IMAGE_URI"

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_FRONTEND_REPO: shopsmart-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecr describe-repositories --repository-names "$ECR_FRONTEND_REPO" --region "${{ secrets.AWS_REGION }}" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_FRONTEND_REPO" --region "${{ secrets.AWS_REGION }}"

          IMAGE_URI=$ECR_REGISTRY/$ECR_FRONTEND_REPO:$IMAGE_TAG

          echo "Building frontend Docker image..."
          docker build -f Docker/Dockerfile.frontend -t $IMAGE_URI .

          echo "Pushing frontend image to ECR..."
          docker push $IMAGE_URI

          echo "✅ Frontend Docker image pushed: $IMAGE_URI"

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate AWS_REGION secret
        run: |
          test -n "${{ secrets.AWS_REGION }}" || (echo "❌ Missing secret: AWS_REGION" && exit 1)
          echo "✅ AWS_REGION secret is present"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Force new deployment for backend service
        run: |
          aws ecs update-service \
            --cluster shopsmart-cluster \
            --service shopsmart-backend-service \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}"
          echo "✅ Backend service deployment triggered"

      - name: Force new deployment for frontend service
        run: |
          aws ecs update-service \
            --cluster shopsmart-cluster \
            --service shopsmart-frontend-service \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}"
          echo "✅ Frontend service deployment triggered"

      - name: Wait for backend service to stabilize
        run: |
          echo "Waiting for backend service to stabilize (timeout: 300s)..."
          timeout 300 aws ecs wait services-stable \
            --cluster shopsmart-cluster \
            --services shopsmart-backend-service \
            --region "${{ secrets.AWS_REGION }}" || \
          (echo "❌ Backend service failed to stabilize within 300s" && exit 1)
          echo "✅ Backend service is stable"

      - name: Wait for frontend service to stabilize
        run: |
          echo "Waiting for frontend service to stabilize (timeout: 300s)..."
          timeout 300 aws ecs wait services-stable \
            --cluster shopsmart-cluster \
            --services shopsmart-frontend-service \
            --region "${{ secrets.AWS_REGION }}" || \
          (echo "❌ Frontend service failed to stabilize within 300s" && exit 1)
          echo "✅ Frontend service is stable"

      - name: Deployment Summary
        if: success()
        run: |
          echo "============================================"
          echo "  ✅ DEPLOYMENT COMPLETE"
          echo "============================================"
          echo "  Region    : ${{ secrets.AWS_REGION }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "  Backend   : shopsmart-backend:${{ github.sha }}"
          echo "  Frontend  : shopsmart-frontend:${{ github.sha }}"
          echo "  Status    : Both ECS services stable"
          echo "============================================"
          echo ""
          echo "👉 Go to AWS Console → ECS → Clusters"
          echo "   → shopsmart-cluster → Tasks"
          echo "   → Copy Public IP → Open in browser"
