name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd shopsmart
            git checkout server/package-lock.json
            git pull origin main
            cd server && npm install
            npx prisma generate
            npx prisma migrate deploy
            pm2 describe shopsmart > /dev/null 2>&1 && pm2 restart shopsmart || pm2 start src/index.js --name shopsmart
