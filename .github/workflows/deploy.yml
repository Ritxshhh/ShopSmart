name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Phase 1 — Tests ─────────────────────────────────────────
  test:
    name: "Phase 1 — Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # ── Server tests ──
      - name: "Server — Install & generate Prisma"
        working-directory: server
        run: npm ci && npx prisma generate

      - name: "Server — Unit tests"
        working-directory: server
        run: npm test

      - name: "Server — Integration tests"
        working-directory: server
        run: npm run test:integration
        env:
          DATABASE_URL: "file:./tests/test.db"

      # ── Client tests ──
      - name: "Client — Install dependencies"
        working-directory: client
        run: npm ci

      - name: "Client — Unit tests"
        working-directory: client
        run: npx vitest run

  # ── Phase 2 — Build & push Docker images to Docker Hub ──────
  # NOTE: ECR is blocked by AWS Academy policy (voc-cancel-cred).
  # Docker Hub is used as the container registry instead.
  build:
    name: "Phase 2 — Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] && MISSING+=("DOCKERHUB_USERNAME")
          [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]    && MISSING+=("DOCKERHUB_TOKEN")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            for s in "${MISSING[@]}"; do echo "   • $s"; done
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ──
      - name: "Build & push backend image"
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./docker/dockerFIle.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-backend:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend image ──
      - name: "Build & push frontend image"
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./docker/dockerFIle.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-frontend:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Phase 3 — Provision infrastructure with Terraform ───────
  # NOTE: Uses local Terraform state (S3 backend blocked by lab policy).
  # ECR and S3 resources are excluded from Terraform for the same reason.
  infrastructure:
    name: "Phase 3 — Terraform (ECS)"
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]     && MISSING+=("AWS_ACCESS_KEY_ID")
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING+=("AWS_SECRET_ACCESS_KEY")
          [ -z "${{ secrets.AWS_SESSION_TOKEN }}" ]     && MISSING+=("AWS_SESSION_TOKEN")
          [ -z "${{ secrets.TF_VAR_SUBNET_IDS }}" ]     && MISSING+=("TF_VAR_SUBNET_IDS")
          [ -z "${{ secrets.TF_VAR_SG_ID }}" ]          && MISSING+=("TF_VAR_SG_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            for s in "${MISSING[@]}"; do echo "   • $s"; done
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      # Use local backend — S3 backend is blocked by lab policy
      - name: Write local backend override
        working-directory: terraform
        run: |
          cat > backend_override.tf <<'EOF'
          terraform {
            backend "local" {}
          }
          EOF

      - name: Terraform Init (local backend)
        working-directory: terraform
        run: terraform init -reconfigure

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_image_tag:          "${{ needs.build.outputs.image_tag }}"
          TF_VAR_subnet_ids:         ${{ secrets.TF_VAR_SUBNET_IDS }}
          TF_VAR_security_group_id:  ${{ secrets.TF_VAR_SG_ID }}
          # Point ECS task definitions at Docker Hub images instead of ECR
          TF_VAR_backend_image:      "${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-backend:${{ needs.build.outputs.image_tag }}"
          TF_VAR_frontend_image:     "${{ secrets.DOCKERHUB_USERNAME }}/shopsmart-frontend:${{ needs.build.outputs.image_tag }}"
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan

      - name: Show outputs
        working-directory: terraform
        run: terraform output

  # ── Phase 4 — Force ECS service redeployment ────────────────
  deploy-ecs:
    name: "Phase 4 — Deploy to ECS Fargate"
    runs-on: ubuntu-latest
    needs: [build, infrastructure]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Force redeploy backend service
        run: |
          aws ecs update-service \
            --cluster shopsmart-cluster \
            --service shopsmart-backend-service \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text
          echo "✅ Backend service redeployment triggered"

      - name: Force redeploy frontend service
        run: |
          aws ecs update-service \
            --cluster shopsmart-cluster \
            --service shopsmart-frontend-service \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text
          echo "✅ Frontend service redeployment triggered"

      - name: Wait for backend to stabilize
        run: |
          echo "⏳ Waiting for backend service to reach steady state..."
          aws ecs wait services-stable \
            --cluster shopsmart-cluster \
            --services shopsmart-backend-service
          echo "✅ Backend service is stable"

      - name: Wait for frontend to stabilize
        run: |
          echo "⏳ Waiting for frontend service to reach steady state..."
          aws ecs wait services-stable \
            --cluster shopsmart-cluster \
            --services shopsmart-frontend-service
          echo "✅ Frontend service is stable"

      - name: "✅ Deployment complete"
        run: echo "🚀 ShopSmart deployed to ECS Fargate successfully!"
