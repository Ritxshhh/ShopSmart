name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: "1.5.7"
  TF_IN_AUTOMATION: "true"
  TF_VAR_subnet_ids: '["${{ secrets.AWS_SUBNET_ID }}"]'
  TF_VAR_security_group_id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
  ECR_BACKEND_REPO: shopsmart-backend
  ECR_FRONTEND_REPO: shopsmart-frontend
  ECS_CLUSTER: shopsmart-cluster

jobs:

  # ── Phase 1 — Tests ─────────────────────────────────────────
  test:
    name: "Phase 1 — Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # ── Server tests ──
      - name: "Server — Install & generate Prisma"
        working-directory: server
        run: npm ci && npx prisma generate

      - name: "Server — Unit tests"
        working-directory: server
        run: npm test

      - name: "Server — Integration tests"
        working-directory: server
        run: npm run test:integration
        env:
          DATABASE_URL: "file:./tests/test.db"

      # ── Client tests ──
      - name: "Client — Install dependencies"
        working-directory: client
        run: npm ci

      - name: "Client — Unit tests"
        working-directory: client
        run: npx vitest run

  # ── Phase 2 — Terraform ─────────────────────────────────────
  terraform:
    name: "Phase 2 — Terraform"
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Validate required AWS secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]     && MISSING+=("AWS_ACCESS_KEY_ID")
          [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && MISSING+=("AWS_SECRET_ACCESS_KEY")
          [ -z "${{ secrets.AWS_REGION }}" ]            && MISSING+=("AWS_REGION")
          [ -z "${{ secrets.AWS_SUBNET_ID }}" ]         && MISSING+=("AWS_SUBNET_ID")
          [ -z "${{ secrets.AWS_SECURITY_GROUP_ID }}" ] && MISSING+=("AWS_SECURITY_GROUP_ID")
          [ -z "${{ secrets.S3_BUCKET_NAME }}" ]        && MISSING+=("S3_BUCKET_NAME")
          [ -z "${{ secrets.S3_BUCKET_PREFIX }}" ]      && MISSING+=("S3_BUCKET_PREFIX")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            for s in "${MISSING[@]}"; do echo "   • $s"; done
            exit 1
          fi
          echo "✅ All required AWS secrets are present"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Prepare Terraform state backend
        run: |
          BUCKET=$(echo "${{ secrets.TF_STATE_BUCKET }}" | tr -d '[:space:]')
          REGION="${{ secrets.AWS_REGION }}"
          USE_S3=false
          if [ -n "$BUCKET" ]; then
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              echo "✅ State bucket exists: $BUCKET"
              USE_S3=true
            else
              echo "Creating state bucket: $BUCKET"
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
                --create-bucket-configuration LocationConstraint="$REGION" 2>/dev/null || \
              aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" 2>/dev/null || \
              { echo "⚠️  Could not create bucket — falling back to local state"; USE_S3=false; }
              if [ "$USE_S3" != "false" ]; then
                aws s3api put-bucket-versioning --bucket "$BUCKET" \
                  --versioning-configuration Status=Enabled
                aws s3api put-bucket-encryption --bucket "$BUCKET" \
                  --server-side-encryption-configuration \
                  '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
                aws s3api put-public-access-block --bucket "$BUCKET" \
                  --public-access-block-configuration \
                  "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
                USE_S3=true
              fi
            fi
          else
            echo "⚠️  TF_STATE_BUCKET not set — using local state"
          fi
          echo "USE_S3=$USE_S3" >> "$GITHUB_ENV"

      - name: "Terraform — Init"
        working-directory: terraform
        run: |
          BUCKET=$(echo "${{ secrets.TF_STATE_BUCKET }}" | tr -d '[:space:]')
          if [ "$USE_S3" = "true" ]; then
            terraform init -upgrade -input=false -reconfigure \
              -backend-config="bucket=${BUCKET}" \
              -backend-config="key=shopsmart/terraform.tfstate" \
              -backend-config="region=${{ secrets.AWS_REGION }}" \
              -backend-config="encrypt=true"
          else
            cat > override.tf <<'EOF'
          terraform {
            backend "local" {}
          }
          EOF
            terraform init -upgrade -input=false -reconfigure
          fi
          echo "✅ Terraform initialized"

      - name: "Terraform — Validate"
        working-directory: terraform
        run: terraform validate && echo "✅ Terraform configuration is valid"

      - name: "Terraform — Import existing resources"
        working-directory: terraform
        env:
          TF_VAR_image_tag: latest
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_s3_bucket_prefix: ${{ secrets.S3_BUCKET_PREFIX }}
        run: |
          do_import() {
            local resource=$1 id=$2
            terraform state show "$resource" >/dev/null 2>&1 && { echo "  ↩ already in state: $resource"; return; }
            terraform import -input=false "$resource" "$id"
          }

          REGION="${{ secrets.AWS_REGION }}"
          CLUSTER="shopsmart-cluster"
          MISSING=()

          # ECR — must exist in Console before running this pipeline
          aws ecr describe-repositories --repository-names shopsmart-backend --region "$REGION" >/dev/null 2>&1 \
            && do_import aws_ecr_repository.backend shopsmart-backend \
            || MISSING+=("ECR repo: shopsmart-backend")

          aws ecr describe-repositories --repository-names shopsmart-frontend --region "$REGION" >/dev/null 2>&1 \
            && do_import aws_ecr_repository.frontend shopsmart-frontend \
            || MISSING+=("ECR repo: shopsmart-frontend")

          # ECS cluster
          aws ecs describe-clusters --clusters "$CLUSTER" --region "$REGION" \
            --query "clusters[?status=='ACTIVE']" --output text 2>/dev/null | grep -q . \
            && do_import aws_ecs_cluster.main "$CLUSTER" \
            || MISSING+=("ECS cluster: $CLUSTER")

          # ECS services (only attempt if cluster was found)
          aws ecs describe-services --cluster "$CLUSTER" --services shopsmart-backend-service \
            --region "$REGION" --query "services[?status=='ACTIVE']" --output text 2>/dev/null | grep -q . \
            && do_import aws_ecs_service.backend "$CLUSTER/shopsmart-backend-service" \
            || echo "  ⚠ ECS service shopsmart-backend-service not found — will be created by apply"

          aws ecs describe-services --cluster "$CLUSTER" --services shopsmart-frontend-service \
            --region "$REGION" --query "services[?status=='ACTIVE']" --output text 2>/dev/null | grep -q . \
            && do_import aws_ecs_service.frontend "$CLUSTER/shopsmart-frontend-service" \
            || echo "  ⚠ ECS service shopsmart-frontend-service not found — will be created by apply"

          # S3 bucket
          S3_BUCKET="${{ secrets.S3_BUCKET_NAME }}"
          if [ -n "$S3_BUCKET" ]; then
            aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null \
              && do_import aws_s3_bucket.shopsmart "$S3_BUCKET" \
              || MISSING+=("S3 bucket: $S3_BUCKET")
          else
            MISSING+=("GitHub secret S3_BUCKET_NAME is not set")
          fi

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo ""
            echo "❌ The following resources must be created manually in the AWS Console"
            echo "   before this pipeline can run (AWS Academy blocks Terraform from creating them):"
            for r in "${MISSING[@]}"; do echo "   • $r"; done
            echo ""
            echo "   Steps:"
            echo "   1. Go to AWS Console → ECR → Create repos: shopsmart-backend, shopsmart-frontend"
            echo "   2. Go to AWS Console → ECS → Create cluster: shopsmart-cluster (Fargate)"
            echo "   3. Go to AWS Console → S3 → Create bucket, then set S3_BUCKET_NAME secret"
            exit 1
          fi

          echo "✅ Import step complete"

      - name: "Terraform — Plan"
        working-directory: terraform
        env:
          TF_VAR_image_tag: latest
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_s3_bucket_prefix: ${{ secrets.S3_BUCKET_PREFIX }}
        run: terraform plan -input=false -out=tfplan && echo "✅ Plan generated"

      - name: "Terraform — Apply"
        working-directory: terraform
        env:
          TF_VAR_image_tag: latest
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_s3_bucket_prefix: ${{ secrets.S3_BUCKET_PREFIX }}
        run: terraform apply -input=false -auto-approve tfplan && echo "✅ Infrastructure provisioned"

  # ── Phase 3 — Build & Push to ECR ───────────────────────────
  build-push:
    name: "Phase 3 — Build & Push"
    runs-on: ubuntu-latest
    needs: [terraform]
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Build & push — Backend"
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$REGISTRY/${{ env.ECR_BACKEND_REPO }}
          docker build -f docker/dockerFIle.backend -t "$IMAGE_URI:$IMAGE_TAG" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"
          echo "✅ Backend pushed: $IMAGE_URI:$IMAGE_TAG"

      - name: "Build & push — Frontend"
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$REGISTRY/${{ env.ECR_FRONTEND_REPO }}
          docker build -f docker/dockerFile.frontend -t "$IMAGE_URI:$IMAGE_TAG" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"
          echo "✅ Frontend pushed: $IMAGE_URI:$IMAGE_TAG"

  # ── Phase 4 — Deploy to ECS Fargate ─────────────────────────
  deploy-ecs:
    name: "Phase 4 — Deploy ECS"
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: "Deploy — Backend service"
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service shopsmart-backend-service \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}"
          echo "✅ Backend deployment triggered"

      - name: "Deploy — Frontend service"
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service shopsmart-frontend-service \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}"
          echo "✅ Frontend deployment triggered"

      - name: "Verify — Backend stability"
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services shopsmart-backend-service \
            --region "${{ secrets.AWS_REGION }}" || \
          { echo "❌ Backend failed to stabilize"; exit 1; }
          echo "✅ Backend service is stable"

      - name: "Verify — Frontend stability"
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services shopsmart-frontend-service \
            --region "${{ secrets.AWS_REGION }}" || \
          { echo "❌ Frontend failed to stabilize"; exit 1; }
          echo "✅ Frontend service is stable"

  # ── Phase 5 — Deploy to EC2 (pm2) ───────────────────────────
  deploy-ec2:
    name: "Phase 5 — Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "${{ secrets.EC2_HOST }}" ] && MISSING+=("EC2_HOST")
          [ -z "${{ secrets.EC2_USER }}" ] && MISSING+=("EC2_USER")
          [ -z "${{ secrets.EC2_KEY }}" ]  && MISSING+=("EC2_KEY")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            for s in "${MISSING[@]}"; do echo "   • $s"; done
            exit 1
          fi
          echo "✅ All required secrets are present"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/shopsmart"

            # Ensure swap exists (prevents OOM on small instances)
            if [ ! -f /swapfile ]; then
              echo "===> Creating 1GB swap file..."
              sudo fallocate -l 1G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            elif ! swapon --show | grep -q /swapfile; then
              sudo swapon /swapfile
            fi
            echo "===> Swap: $(free -m | grep Swap | awk '{print $2}')MB"

            # Limit Node.js memory to avoid OOM
            export NODE_OPTIONS="--max-old-space-size=512"

            echo "===> Pulling latest code..."
            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "===> Installing server dependencies..."
            cd "$REPO_DIR/server"
            npm install --omit=dev
            npx prisma generate

            echo "===> Running database migrations..."
            npx prisma migrate deploy || echo "⚠️  Migration skipped (no pending migrations or no DB configured)"

            echo "===> Building client..."
            cd "$REPO_DIR/client"
            npm install
            npm run build

            echo "===> Restarting server with pm2..."
            cd "$REPO_DIR/server"
            if pm2 describe shopsmart > /dev/null 2>&1; then
              pm2 restart shopsmart
            else
              pm2 start src/index.js --name shopsmart
            fi
            pm2 save

            echo "✅ Deployment complete!"
