name: Lint Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint server
        working-directory: server
        run: |
          npm ci
          npm run lint

      - name: Lint client
        working-directory: client
        run: |
          npm ci
          npm run lint
